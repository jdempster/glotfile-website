name: Deploy site

# Builds the docs from the committed docs-src/ snapshot (no sibling glotfile repo
# needed) and publishes the static site to GitHub Pages. Refresh docs-src/ locally
# with `npm run docs:sync` and commit it; this workflow does the rest.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run docs:build
      - name: Assemble publish directory
        run: |
          mkdir -p _site
          cp -R index.html favicon.svg css js assets docs _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
